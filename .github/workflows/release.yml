name: Compile and Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Configuramos para que los comandos de Flutter se ejecuten dentro de AppMovil
    defaults:
      run:
        working-directory: ./AppMovil

    steps:
      # 1. Descargar el código completo del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Configurar Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Instalar dependencias y compilar el APK (dentro de AppMovil)
      - name: Install dependencies and Build APK
        run: |
          flutter pub get
          flutter build apk --release

      # 5. Crear la Release en GitHub y subir el APK generado
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: true
          # Apuntamos a la ruta del APK combinando el subdirectorio y la salida de Flutter
          files: AppMovil/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}